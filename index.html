<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scrollytelling Test</title>

<style>
:root {
    --bg: #faeae0;
    --text: #111;
    --accent: #e8186d;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* NAV */
nav {
    position: sticky;
    top: 0;
    z-index: 1000;
    padding: 15px 30px;
    background: white;
    border-bottom: 2px solid #111;
}

/* ========================= */
/* SCROLLYTELLING CONTAINER */
/* ========================= */
.scrolly {
    position: relative;
}

/* GRAPH (STICKY PART) */
.graph {
    position: sticky;
    top: 60px; /* below navbar */
    height: calc(100vh - 60px);
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 1;
}

.graph img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

/* TEXT STEPS */
.steps {
    position: relative;
    z-index: 2;
}

/* EACH TEXT BLOCK */
.step {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;

    /* THIS creates fade over image */
    background: linear-gradient(
        to bottom,
        rgba(250,234,224,0) 0%,
        var(--bg) 70%
    );
}

.step div {
    max-width: 600px;
    text-align: center;
}

.step h1 {
    color: var(--accent);
}

/* AFTER SECTION (IMAGE GONE) */
.after {
    padding: 100px 40px;
    background: var(--bg);
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
}
</style>
</head>

<body>

<nav>
    SF Crime Story
</nav>

<section class="scrolly">

    <!-- STICKY IMAGE -->
    <div class="graph">
        <img src="images/SFDataTitle.jpeg">
    </div>

    <!-- TEXT THAT SCROLLS OVER -->
    <div class="steps">

        <div class="step">
            <div>
                <h1>SF Crime</h1>
                <p>This is where the story begins.</p>
            </div>
        </div>

        <div class="step">
            <div>
                <h1>Patterns Over Time</h1>
                <p>Crime rises and falls throughout the day.</p>
            </div>
        </div>

        <div class="step">
            <div>
                <h1>Night Behavior</h1>
                <p>Late hours show distinct spikes.</p>
            </div>
        </div>

    </div>

</section>

<!-- NORMAL CONTENT AFTER (IMAGE IS GONE NOW) -->
<section class="after">

    <div class="card">
        <h2>Yearly Crime Trends</h2>
        <p>Now we move into normal page content.</p>
    </div>

    <div class="card">
        <h2>Maps & Analysis</h2>
        <p>The sticky graphic is now completely gone.</p>
    </div>

</section>

</body>
</html>
