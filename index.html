<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SF Crime: 24 Hours in San Francisco</title>

<style>
:root {
    --bg: #f7f6f3;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #6b6b6b;

    --accent: #e45757;
    --accent-soft: #f3d6d6;

    --border: #e5e3df;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* NAV */
nav {
    position: sticky;
    top: 0;
    z-index: 1000;

    display: flex;
    justify-content: space-between;
    padding: 16px 32px;

    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(12px);

    border-bottom: 1px solid var(--border);
}

/* SCROLL SECTION */
.graph-container {
    position: relative;
    height: 200vh;
}

.graph {
    position: sticky;
    top: 0;
    height: 100vh;

    display: block; /* 🔥 FIX */
}

.graph img {
    width: 100%;
    height: 100%;
    object-fit: cover;  /* 🔥 FIX */
    object-position: top;
}

/* CONTENT */
.content {
    position: relative;
    z-index: 2;
}

.hero {
    margin-top: -70vh;
    padding-top: 60vh;

    height: 100vh;

    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;

    background: linear-gradient(
        to bottom,
        rgba(247,246,243,0) 0%,
        rgba(247,246,243,0.6) 40%,
        var(--bg) 60%
    );
}

.hero h1 {
    font-size: 3rem;
}

.hero p {
    color: var(--muted);
}

</style>
</head>

<body>

<nav>
    <div>A data story by Group 31</div>
</nav>

<section class="graph-container">

    <div class="graph">
        <img src="images/prostitution_ridgeline.png">
    </div>

    <div class="content">
        <section class="hero">
            <div>
                <h1>SF Crime: Two Decades of Data</h1>
                <p>Scroll down to explore crime patterns.</p>
            </div>
        </section>
    </div>

</section>

</body>
</html>
