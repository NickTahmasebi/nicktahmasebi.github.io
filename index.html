<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SF Crime: 24 Hours in San Francisco</title>

<style>
:root {
    --bg: #f7f6f3;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #6b6b6b;

    --accent: #e45757;
    --accent-soft: #f3d6d6;

    --border: #e5e3df;
}

.dark-mode {
    --bg: #121212;
    --card: #1e1e1e;
    --text: #f3f3f3;
    --muted: #9a9a9a;

    --accent: #ff6b6b;
    --accent-soft: #3a1f1f;

    --border: #2a2a2a;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* NAV */
nav {
    position: sticky;
    top: 0;
    z-index: 1000;

    display: flex;
    justify-content: space-between;
    padding: 16px 32px;

    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(12px);

    border-bottom: 1px solid var(--border);
}

nav span {
    color: var(--accent);
    font-weight: 600;
}

/* SCROLLYTELLING */
.graph-container {
    position: relative;
    height: 200vh;
}

.graph {
    position: sticky;
    top: 0;               /* FIXED */
    height: 100vh;        /* FULL SCREEN */

    display: flex;
    align-items: center;
    justify-content: center;

    z-index: 1;
}

.graph img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

.content {
    position: relative;
    z-index: 2;
}

/* HERO */
.hero {
    margin-top: -70vh;
    padding-top: 60vh;

    height: 100vh;

    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;

    background: linear-gradient(
        to bottom,
        rgba(247,246,243,0) 0%,
        rgba(247,246,243,0.6) 40%,
        var(--bg) 60%
    );
}

.hero h1 {
    font-size: 3rem;
    letter-spacing: -0.02em;
}

.hero p {
    max-width: 700px;
    margin: auto;
    color: var(--muted);
    line-height: 1.7;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 30px;
    padding: 60px 40px;
}

/* CARD */
.card {
    background: var(--card);
    border-radius: 16px;
    overflow: hidden;

    border: 1px solid var(--border);
    box-shadow: 0 10px 30px rgba(0,0,0,0.04);

    transition: all 0.25s ease;
}

.card:hover {
    transform: translateY(-6px);
    box-shadow: 0 18px 40px rgba(0,0,0,0.08);
}

.card img,
.thumb {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.thumb {
    background: var(--accent-soft);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
}

.card-content {
    padding: 20px;
}

.card p {
    color: var(--muted);
}

.spacer {
    height: 100vh;
}
</style>
</head>

<body>

<nav>
    <div>A data story by <span>Group 31: Nick Tahmasebi, Filip Sahakian & Destin Zhong</span></div>
    <button onclick="toggleMode()">Toggle Mode</button>
</nav>

<section class="graph-container">

    <div class="graph">
        <img src="images/prostitution_ridgeline.png">
    </div>

    <div class="content">
        <section class="hero">
            <div>
                <h1>SF Crime: Two Decades of Data</h1>
                <p>
                    Scroll down to explore how crime evolves across time, geography, and human behavior.
                </p>
            </div>
        </section>
    </div>

</section>

<section class="grid">

    <div class="card">
        <img src="images/yearly_crime_trends.png">
        <div class="card-content">
            <h2>Yearly Crime Trends</h2>
            <p>How major crime categories have shifted over time.</p>
        </div>
    </div>

</section>

<div class="spacer"></div>

<script>
function toggleMode() {
    document.body.classList.toggle("dark-mode");
}
</script>

</body>
</html>
